version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./auth-service/.env
    environment:
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification-service
    ports:
      - "3002:3002"
    env_file:
      - ./notification-service/.env
    environment:
      - RABBITMQ_URL=amqp://rabbitmq
      - PORT=3002
    depends_on:
      rabbitmq:
        condition: service_healthy

  api-gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service